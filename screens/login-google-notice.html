<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 / 회원가입 · Vuddy</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="../tokens/tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--surface-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    /* ── Page ── */
    .login-page {
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: var(--space-10xl) var(--space-3xl);
    }

    /* ── Card ── */
    .login-card {
      width: 100%;
      max-width: 312px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-6xl);
    }

    @media (min-width: 768px) {
      .login-card {
        max-width: 432px;
      }
    }

    /* ── etc_logographic ── */
    .etc-logographic {
      width: 186px;
      height: 80px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .etc-logographic__bg {
      position: absolute;
      width: 180.715px;
      height: 60.238px;
      background: var(--surface-vuddy-highlight);
      transform: rotate(-5.97deg);
      top: 50%;
      left: 50%;
      translate: -50% -51%;
    }

    .etc-logographic__wordmark {
      position: absolute;
      width: 145.017px;
      height: 38.5px;
      top: 50%;
      left: 50%;
      translate: -50% -50%;
      transform: rotate(-5.97deg);
    }

    /* ── Body ── */
    .login-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4xl);
      width: 100%;
    }

    /* ── Texts ── */
    .login-texts {
      display: flex;
      flex-direction: column;
      gap: var(--gap-xl);
      text-align: center;
      width: 100%;
    }

    .login-title {
      font-size: var(--font-size-title-base);
      line-height: var(--line-height-title-base);
      font-weight: 700;
      color: var(--text-primary);
    }

    .login-subtitle {
      font-size: var(--font-size-body-small);
      line-height: var(--line-height-body-small);
      font-weight: 400;
      color: var(--text-tertiary);
    }

    /* ── Button list ── */
    .btn-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-large);
      width: 100%;
    }

    /* ── Check / Cautionary ── */
    .check-cautionary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-xs);
      width: 100%;
      padding: var(--space-medium) var(--space-large);
      background: var(--surface-caution-lowest);
      border-radius: var(--radius-base);
    }

    .check-cautionary__icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: var(--icon-caution);
    }

    .check-cautionary__icon path {
      fill: var(--icon-caution);
    }

    .check-cautionary__text {
      font-size: var(--font-size-caption-base);
      line-height: var(--line-height-caption-base);
      font-weight: 600;
      color: var(--text-caution);
      text-align: center;
    }

    /* ── Social login button (Outline / Secondary) ── */
    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--gap-base);
      width: 100%;
      height: 52px;
      padding: 0 var(--padding-small);
      border: var(--stroke-base) solid var(--line-divider-primary);
      border-radius: var(--radius-large);
      background: transparent;
      font-family: inherit;
      font-size: var(--font-size-body-base);
      line-height: var(--line-height-body-base);
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-social:hover {
      background: var(--surface-hover);
    }

    .btn-social:active {
      background: var(--surface-pressed);
    }

    .btn-social img {
      width: var(--image-xs);
      height: var(--image-xs);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <main class="login-page">
    <div class="login-card">

      <!-- etc_logographic -->
      <div class="etc-logographic" aria-label="Vuddy">
        <div class="etc-logographic__bg"></div>
        <img class="etc-logographic__wordmark"
          src="https://www.figma.com/api/mcp/asset/c9b648d7-027a-4626-96ce-d4d5bc731902"
          alt="Vuddy" />
      </div>

      <!-- Text + Buttons -->
      <div class="login-body">

        <div class="login-texts">
          <p class="login-title">버디에 오신 것을 환영합니다!</p>
          <p class="login-subtitle">
            간편하게 로그인 또는 회원가입하고<br>
            버디에서 다양한 크리에이터 굿즈들을 만나보세요!
          </p>
        </div>

        <div class="btn-list">

          <!-- Check / Cautionary: 구글 로그인 안내 -->
          <div class="check-cautionary" role="note">
            <svg class="check-cautionary__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12.0003 16.75C12.2129 16.75 12.391 16.6781 12.5345 16.5343C12.6782 16.3906 12.75 16.2125 12.75 16V11.75C12.75 11.5375 12.6781 11.3593 12.5343 11.2155C12.3904 11.0718 12.2122 11 11.9998 11C11.7871 11 11.609 11.0718 11.4655 11.2155C11.3218 11.3593 11.25 11.5375 11.25 11.75V16C11.25 16.2125 11.3219 16.3906 11.4658 16.5343C11.6096 16.6781 11.7878 16.75 12.0003 16.75ZM12 9.2885C12.2288 9.2885 12.4207 9.21108 12.5755 9.05625C12.7303 8.90142 12.8077 8.70958 12.8077 8.48075C12.8077 8.25192 12.7303 8.06008 12.5755 7.90525C12.4207 7.75058 12.2288 7.67325 12 7.67325C11.7712 7.67325 11.5793 7.75058 11.4245 7.90525C11.2697 8.06008 11.1923 8.25192 11.1923 8.48075C11.1923 8.70958 11.2697 8.90142 11.4245 9.05625C11.5793 9.21108 11.7712 9.2885 12 9.2885ZM12.0017 21.5C10.6877 21.5 9.45267 21.2507 8.2965 20.752C7.14033 20.2533 6.13467 19.5766 5.2795 18.7218C4.42433 17.8669 3.74725 16.8617 3.24825 15.706C2.74942 14.5503 2.5 13.3156 2.5 12.0017C2.5 10.6877 2.74933 9.45267 3.248 8.2965C3.74667 7.14033 4.42342 6.13467 5.27825 5.2795C6.13308 4.42433 7.13833 3.74725 8.294 3.24825C9.44967 2.74942 10.6844 2.5 11.9983 2.5C13.3123 2.5 14.5473 2.74933 15.7035 3.248C16.8597 3.74667 17.8653 4.42342 18.7205 5.27825C19.5757 6.13308 20.2528 7.13833 20.752 8.294C21.2506 9.44967 21.5 10.6844 21.5 11.9983C21.5 13.3123 21.2507 14.5473 20.752 15.7035C20.2533 16.8597 19.5766 17.8653 18.7218 18.7205C17.8669 19.5757 16.8617 20.2528 15.706 20.7518C14.5503 21.2506 13.3156 21.5 12.0017 21.5Z" fill="currentColor"/>
            </svg>
            <p class="check-cautionary__text">구글 로그인 시 보안 정책에 따라<br>외부 브라우저로 이동합니다.</p>
          </div>

          <!-- Apple -->
          <button class="btn-social">
            <img src="../icons/svg/etc_logo_apple.svg" alt="" />
            Apple로 시작하기
          </button>

          <!-- Google -->
          <button class="btn-social">
            <img src="../icons/svg/etc_logo_google.svg" alt="" />
            Google로 시작하기
          </button>

          <!-- Naver -->
          <button class="btn-social">
            <img src="../icons/svg/etc_logo_naver.svg" alt="" />
            네이버로 시작하기
          </button>

        </div>
      </div>

    </div>
  </main>
</body>
</html>
